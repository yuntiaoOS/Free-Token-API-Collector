# ============================================================
# Free Token API Collector
# ============================================================

network:
  proxy: "http://127.0.0.1:7897"
  timeout_seconds: 15
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/137.0"

github:
  token: ""
  search_max_repos: 10
  request_delay_seconds: 2

scheduler:
  refresh_interval_hours: 4
  validate_interval_hours: 1
  cleanup_expired: true
  max_consecutive_failures: 3

validator:
  max_concurrent: 10
  request_timeout_seconds: 10
  test_model_openai: "gpt-4o"
  test_model_anthropic: "claude-sonnet-4-20250514"

ccswitch:
  db_path: "C:\\Users\\Administrator\\.cc-switch\\cc-switch.db"
  auto_category: "auto_discovered"
  never_overwrite: true

sources:
  - type: github_readme
    repos:
      - owner: "chatanywhere"
        repo: "GPT_API_free"
      - owner: "popjane"
        repo: "free_chatgpt_api"
      - owner: "mnfst"
        repo: "awesome-free-llm-apis"
      - owner: "dan1471"
        repo: "FREE-openai-api-keys"
      - owner: "alistaitsacle"
        repo: "free-llm-api-keys"
      - owner: "Free-The-Ai"
        repo: "free-ai"
      - owner: "open-free-llm-api"
        repo: "awesome-freellm-apis"
      - owner: "reorx"
        repo: "awesome-chatgpt-api"
      - owner: "GetGoAPI"
        repo: "Free-GPT-Grok-Gemini-Claude-API"

  - type: github_search
    queries:
      - "free-chatgpt-api stars:>100"
      - "free api key openai stars:>50"
      - "free claude api key stars:>30"
      - "openai-free-api stars:>50"
    max_repos: 10

  - type: web_aggregator
    urls: []
