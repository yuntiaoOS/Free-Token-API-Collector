# ============================================================
# Free Token API Collector
# ============================================================

network:
  proxy: "http://127.0.0.1:7897"
  timeout_seconds: 15
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/137.0"

github:
  token: ""
  search_max_repos: 10
  request_delay_seconds: 2

scheduler:
  refresh_interval_hours: 4
  validate_interval_hours: 1
  cleanup_expired: true
  max_consecutive_failures: 3

validator:
  max_concurrent: 5
  request_timeout_seconds: 10
  discover_models: true
  test_model_openai: "gpt-4o"
  test_model_anthropic: "claude-sonnet-4-20250514"
  # 写入 cc-switch 前发送真实问答，确认能正常回复（非仅连通性探测）
  test_prompt: "请用一句话回答：1+1等于几？只回复数字或简短答案。"
  test_max_tokens: 64
  test_max_output_tokens: 128   # Codex /responses，MiMo 等 reasoning 模型需要更多 token
  min_reply_chars: 1             # 回复内容最少字符数，低于此值视为失败
  prefer_codex: true            # 优先探测 Codex /responses，可用则写入 codex 分类
  max_models_to_try: 12          # 验证时逐个尝试的模型数量上限

ccswitch:
  # 留空则自动检测当前用户的 ~/.cc-switch/cc-switch.db
  db_path: ""
  auto_category: "auto_discovered"
  never_overwrite: true

sources:
  - type: github_readme
    repos:
      - owner: "chatanywhere"
        repo: "GPT_API_free"
      - owner: "popjane"
        repo: "free_chatgpt_api"
      - owner: "mnfst"
        repo: "awesome-free-llm-apis"
      - owner: "dan1471"
        repo: "FREE-openai-api-keys"
      - owner: "alistaitsacle"
        repo: "free-llm-api-keys"
      - owner: "Free-The-Ai"
        repo: "free-ai"
      - owner: "open-free-llm-api"
        repo: "awesome-freellm-apis"
      - owner: "reorx"
        repo: "awesome-chatgpt-api"
      - owner: "GetGoAPI"
        repo: "Free-GPT-Grok-Gemini-Claude-API"

  - type: github_search
    queries:
      - "free-chatgpt-api stars:>100"
      - "free api key openai stars:>50"
      - "free claude api key stars:>30"
      - "openai-free-api stars:>50"
    max_repos: 10

  - type: web_aggregator
    urls: []

  - type: forum
    request_delay_seconds: 2
    retry_count: 3
    retry_backoff_seconds: 2
    max_topics_per_entry: 30
    max_pages_per_entry: 3
    max_posts_per_topic: 50
    min_confidence: 50
    sites:
      - name: v2ex
        base_url: https://www.v2ex.com
        platform: v2ex
        min_topic_id: 500000
        max_topics_per_entry: 20
        topic_title_include:
          - mimo
          - token
          - api
          - key
          - gpt
          - claude
          - openai
          - grok
          - 模型
          - 小米
          - xiaomi
        topic_title_exclude:
          - 网易云
          - epic
          - 会员
          - 机箱
          - 白板
          - 积分
          - windsurf
          - 送码
        feed_urls:
          - https://www.v2ex.com/feed/free.json
        entry_urls:
          - https://www.v2ex.com/go/free

      - name: linux.do
        base_url: https://linux.do
        platform: discourse
        cookie: ""
        request_delay_seconds: 4
        max_topics_per_entry: 40
        feed_urls:
          - https://linux.do/c/welfare/36.rss
          # 子标签 RSS 常返回 406，改由福利区 RSS + 标题过滤 mimo
        topic_title_include:
          - mimo
          - token
          - api
          - key
          - gpt
          - claude
          - openai
          - grok
          - 模型
          - 大模型
          - deepseek
          - gemini
          - qwen
          - codex
          - 小米
          - xiaomi
          - 人工智能
          - 白嫖
          - credits
          - 分享
        topic_title_exclude:
          - 网易云
          - epic
          - 会员
          - 机箱
          - 白板
          - happyhorse
          - 积分
          - windsurf
          - 续费
          - 套餐
        entry_urls:
          - https://linux.do/tags/c/welfare/36/mimo/1562

      - name: nodeseek
        base_url: https://www.nodeseek.com
        platform: nodeseek
        cookie: ""
        entry_urls:
          - https://www.nodeseek.com/board/tech
          - https://www.nodeseek.com/search?query=free+api

      - name: deepflood
        base_url: https://www.deepflood.com
        platform: nodeseek
        cookie: ""
        entry_urls:
          - https://www.deepflood.com/
          - https://www.deepflood.com/search?query=free+api
